# Reusable environment variable groups.
#
# `pydantic-agents-workflows-pipeline` is the single source of truth for the Q&A pipeline config
# (LLM/Logfire secrets + thresholds + model selection). It is consumed by the
# API gateway below AND linked to the Render Workflows service (created in the
# Dashboard — Blueprints don't yet support Workflows). Both run the same
# `backend.config.Settings`, so they must see identical config; linking one
# group beats hand-pasting ~20 vars into the Dashboard.
#
# `pydantic-agents-workflows-pipeline-trigger` holds the creds the gateway + ingest cron need to trigger
# and poll workflow runs. Set WORKFLOW_SLUG once after the Workflows service
# exists and both services inherit it.
envVarGroups:
  - name: pydantic-agents-workflows-pipeline
    envVars:
      # Secrets — prompted once on first apply (no defaults in backend/config.py)
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: LOGFIRE_TOKEN
        sync: false
      - key: LOGFIRE_READ_TOKEN
        sync: false
      # Pipeline configuration
      - key: MAX_TOKENS
        value: "2000"
      - key: TIMEOUT_SECONDS
        value: "30"
      # RAG configuration
      - key: RAG_TOP_K
        value: "20"
      - key: SIMILARITY_THRESHOLD
        value: "0.3"
      - key: VERIFICATION_THRESHOLD
        value: "0.30"
      - key: EMBEDDING_MODEL
        value: text-embedding-3-small
      - key: EMBEDDING_DIMENSIONS
        value: "1536"
      # Model selection
      - key: ANSWER_MODEL
        value: claude-sonnet-4-6
      - key: CLAIMS_MODEL
        value: gpt-5.4-mini
      - key: ACCURACY_MODEL
        value: claude-sonnet-4-6
      - key: EVAL_MODEL_OPENAI
        value: gpt-5.4-mini
      - key: EVAL_MODEL_ANTHROPIC
        value: claude-sonnet-4-6
      - key: QUERY_EXPANSION_MODEL
        value: gpt-4.1-nano
      # Performance
      - key: ENABLE_CACHING
        value: "true"
      - key: LOG_LEVEL
        value: INFO

  - name: pydantic-agents-workflows-pipeline-trigger
    envVars:
      - key: RENDER_API_KEY
        sync: false
      - key: WORKFLOW_SLUG
        sync: false

projects:
  - name: pydantic-agents-workflows
    environments:
      - name: production
        # PostgreSQL database with pgvector extension
        databases:
          - name: pydantic-agents-workflows-db
            databaseName: pydantic_agents_db
            user: pydantic_agents_user
            plan: basic-1gb
            region: oregon
            postgresMajorVersion: "17"

        # Services in the production environment
        services:
          # Backend API gateway (FastAPI + Logfire).
          # The Q&A pipeline + ingestion run in a separate Render Workflows
          # service (created in the Dashboard — Blueprints don't yet support
          # Workflows). This gateway triggers and polls workflow runs.
          - type: web
            name: pydantic-agents-workflows-api
            runtime: python
            plan: starter
            region: oregon
            buildCommand: uv sync --no-dev --frozen
            startCommand: uv run uvicorn backend.main:app --host 0.0.0.0 --port $PORT
            # Refresh live RAG sources on every deploy via the consolidated,
            # data-driven ingest entrypoint (no Render Workflows). Ingests all
            # sources in data/sources.py: pricing, autoscaling, nodejs,
            # workflows_docs, workflows_tutorial, tutorials_index.
            preDeployCommand: uv run python data/scripts/ingest_pages.py
            healthCheckPath: /health
            envVars:
              # Shared pipeline config + secrets (also linked to the Workflows service)
              - fromGroup: pydantic-agents-workflows-pipeline
              # Workflow trigger creds (shared with the ingest cron)
              - fromGroup: pydantic-agents-workflows-pipeline-trigger
              # Database connection (auto-injected from database)
              - key: DATABASE_URL
                fromDatabase:
                  name: pydantic-agents-workflows-db
                  property: connectionString

          # Ingestion refresh cron — triggers the Workflow's `ingest_all`
          # fan-out on a schedule (Workflows have no built-in scheduling).
          - type: cron
            name: pydantic-agents-workflows-ingest
            runtime: python
            plan: starter
            region: oregon
            schedule: "0 6 * * *"  # daily at 06:00 UTC
            buildCommand: uv sync --no-dev --frozen
            startCommand: uv run python workflows/trigger_ingest.py
            envVars:
              # Only needs the trigger creds (RENDER_API_KEY + WORKFLOW_SLUG)
              - fromGroup: pydantic-agents-workflows-pipeline-trigger

          # Frontend (Next.js Static Site)
          - type: web
            runtime: static
            name: pydantic-agents-workflows-frontend
            rootDir: frontend
            buildCommand: rm -rf node_modules/.cache .next out && npm ci && npm run build
            staticPublishPath: out
            pullRequestPreviewsEnabled: true
            envVars:
              # API URL - set to the backend service's public URL after first deploy
              - key: NEXT_PUBLIC_API_URL
                sync: false
            routes:
              - type: rewrite
                source: /*
                destination: /index.html
