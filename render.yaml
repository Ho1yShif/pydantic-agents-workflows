projects:
  - name: pydantic-agents
    environments:
      - name: production
        # PostgreSQL database with pgvector extension
        databases:
          - name: pydantic-agents-db
            databaseName: pydantic_agents_db
            user: pydantic_agents_user
            plan: basic-1gb
            region: oregon
            postgresMajorVersion: "17"

        # Services in the production environment
        services:
          # Backend API gateway (FastAPI + Logfire).
          # The Q&A pipeline + ingestion run in a separate Render Workflows
          # service (created in the Dashboard — Blueprints don't yet support
          # Workflows). This gateway triggers and polls workflow runs.
          - type: web
            name: pydantic-agents-api
            runtime: python
            plan: starter
            region: oregon
            buildCommand: uv sync --no-dev --frozen
            startCommand: uv run uvicorn backend.main:app --host 0.0.0.0 --port $PORT
            healthCheckPath: /health
            envVars:
              # API Keys (will prompt for values on first deploy)
              - key: OPENAI_API_KEY
                sync: false
              - key: ANTHROPIC_API_KEY
                sync: false
              - key: LOGFIRE_TOKEN
                sync: false
              - key: LOGFIRE_READ_TOKEN
                sync: false
              # Render Workflows: trigger/poll the pipeline workflow.
              # Set after creating the Workflow service in the Dashboard.
              - key: RENDER_API_KEY
                sync: false
              - key: WORKFLOW_SLUG
                sync: false
              # Database connection (auto-injected from database)
              - key: DATABASE_URL
                fromDatabase:
                  name: pydantic-agents-db
                  property: connectionString
              # Pipeline configuration
              - key: QUALITY_THRESHOLD
                value: "85"
              - key: ACCURACY_THRESHOLD
                value: "70"
              - key: MAX_ITERATIONS
                value: "1"
              - key: MAX_TOKENS
                value: "2000"
              # RAG configuration
              - key: RAG_TOP_K
                value: "20"
              - key: SIMILARITY_THRESHOLD
                value: "0.3"
              - key: VERIFICATION_THRESHOLD
                value: "0.30"
              # Performance settings
              - key: ENABLE_CACHING
                value: "true"
              - key: LOG_LEVEL
                value: INFO

          # Ingestion refresh cron — triggers the Workflow's `ingest_all`
          # fan-out on a schedule (Workflows have no built-in scheduling).
          - type: cron
            name: pydantic-agents-ingest
            runtime: python
            plan: starter
            region: oregon
            schedule: "0 6 * * *"  # daily at 06:00 UTC
            buildCommand: uv sync --no-dev --frozen
            startCommand: uv run python workflows/trigger_ingest.py
            envVars:
              # Set after creating the Workflow service in the Dashboard.
              - key: RENDER_API_KEY
                sync: false
              - key: WORKFLOW_SLUG
                sync: false

          # Frontend (Next.js Static Site)
          - type: web
            runtime: static
            name: pydantic-agents-frontend
            rootDir: frontend
            buildCommand: rm -rf node_modules/.cache .next out && npm ci && npm run build
            staticPublishPath: out
            pullRequestPreviewsEnabled: true
            envVars:
              # API URL - set to the backend service's public URL after first deploy
              - key: NEXT_PUBLIC_API_URL
                sync: false
            routes:
              - type: rewrite
                source: /*
                destination: /index.html

